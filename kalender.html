<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorenz DJ – Kalender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="kalender.css">
</head>
<body>

  <!-- PASSWORT-GATE -->
  <div id="cal-gate">
    <div class="gate-card">
      <div class="gate-logo">L</div>
      <h1>Buchungs-Kalender</h1>
      <p>Nur für Lorenz</p>
      <form class="gate-field" id="cal-gate-form" autocomplete="off">
        <input type="text" id="gate-password" placeholder="Passwort eingeben">
        <button type="submit" class="gate-btn">Rein</button>
      </form>
      <p id="gate-error" class="gate-error"></p>
    </div>
  </div>

  <!-- KALENDER-APP -->
  <div id="cal-app" style="display:none">
    <header class="cal-header">
      <div class="cal-header-inner">
        <div class="cal-title">
          <div class="cal-logo">L</div>
          <span>Buchungs-Kalender</span>
        </div>
        <button class="logout-btn" id="cal-logout-btn">Logout</button>
      </div>
    </header>

    <main class="cal-main">
      <!-- Monatsnavigation -->
      <div class="month-nav">
        <button class="month-btn" id="prev-month" aria-label="Vorheriger Monat">&#8249;</button>
        <h2 id="month-label">Juni 2026</h2>
        <button class="month-btn" id="next-month" aria-label="Nächster Monat">&#8250;</button>
      </div>

      <!-- Wochentag-Header -->
      <div class="cal-weekdays">
        <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span>
        <span class="weekend">Sa</span><span class="weekend">So</span>
      </div>

      <!-- Kalender-Grid -->
      <div class="cal-grid" id="cal-grid"></div>

      <!-- Legende -->
      <div class="cal-legend">
        <span class="legend-dot pending"></span> Ausstehend
        <span class="legend-dot confirmed"></span> Bestätigt
        <span class="legend-dot cancelled"></span> Abgelehnt
      </div>
    </main>

    <!-- Detail-Panel (erscheint wenn ein Tag angeklickt wird) -->
    <div id="detail-panel" class="detail-panel hidden">
      <div class="detail-inner">
        <button class="detail-close" id="detail-close" aria-label="Schließen">&times;</button>
        <h3 id="detail-date"></h3>
        <div id="detail-list"></div>
      </div>
    </div>
    <div id="detail-backdrop" class="detail-backdrop hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="kalender.js"></script>
</body>
</html>
